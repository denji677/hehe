<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    font-family: 'Zen Maru Gothic', sans-serif;
    overflow: hidden;
    color: white;
}

/* START SCREEN */
#startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    cursor: pointer;
    z-index: 10;
}

/* MAIN CONTENT */
.container {
    display: none;
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('anime.jpg');
    background-size: cover;
    background-position: center;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* NAME GLOW */
.name {
    font-size: 42px;
    color: #66a3ff;
    text-shadow: 0 0 10px #001f4d, 0 0 30px #003366;
    margin-bottom: 10px;
}

/* TITLE */
h1 {
    font-size: 30px;
    margin: 0;
    color: #66a3ff;
    text-shadow: 0 0 10px #001f4d, 0 0 25px #003366;
}

/* TEXT */
#text {
    max-width: 600px;
    margin: 20px;
    line-height: 1.6;
}

/* VIDEO */
video {
    width: 420px;
    border-radius: 15px;
    box-shadow: 0 0 10px #001f4d,
                0 0 25px #003366,
                0 0 50px #004080;
}

/* PETALS */
.petal {
    position: absolute;
    top: -50px;
    color: pink;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>

</head>

<body>

<!-- START SCREEN -->
<div id="startScreen" onclick="startExperience()">
    Click to start ❤️
</div>

<!-- AUDIO -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<!-- MAIN -->
<div class="container" id="mainContent">

    <div class="name">SHAISHA MY LOVE ❤️</div>
    <h1>I Love You!!!</h1>

    <p id="text"></p>

    <video controls>
        <source src="songyess.mp4" type="video/mp4">
    </video>

</div>

<script>
function startExperience() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "flex";
    document.getElementById("music").play();
    typeWriter();
}

/* TYPING MESSAGE */
const message = "HIII I made this for you. Because honestly, I really don’t think words are enough to explain how much you mean to me. But I’ll try by guitaring and singing for you anyway. You make my days brighter, my problems feel smaller, and my life feel complete. I love you so much. ❤️";

let i = 0;
function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}

/* PETALS */
function createPetal() {
    const petal = document.createElement("div");
    petal.classList.add("petal");
    petal.innerHTML = "🌸";
    petal.style.left = Math.random() * 100 + "vw";
    petal.style.animationDuration = (4 + Math.random() * 4) + "s";
    document.body.appendChild(petal);

    setTimeout(() => petal.remove(), 8000);
}

setInterval(createPetal, 300);
</script>

</body>
</html>
